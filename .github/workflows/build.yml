name: Nova Genix - Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Clean build
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        shell: pwsh
        run: |
          $content = "NOVA_API_URL=${{ secrets.NOVA_API_URL }}"
          Set-Content -Path .env -Value $content -Encoding UTF8

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Sign application executable
        shell: pwsh
        run: |
          # Créer un certificat auto-signé pour la signature de code
          $cert = New-SelfSignedCertificate `
            -Type CodeSigning `
            -Subject "CN=Nova Genix Digital, O=Nova Genix Digital, C=GN" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -KeyUsage DigitalSignature `
            -FriendlyName "Nova Genix Code Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          
          # Exporter le certificat en PFX
          $pfxPassword = ConvertTo-SecureString -String "NovaGenix@2026!" -Force -AsPlainText
          $pfxPath = "$env:RUNNER_TEMP\nova_codesign.pfx"
          $cert | Export-PfxCertificate -FilePath $pfxPath -Password $pfxPassword | Out-Null
          
          # Ajouter le certificat aux autorités de confiance (pour que signtool l'accepte)
          $store = New-Object System.Security.Cryptography.X509Certificates.X509Store("Root", "LocalMachine")
          $store.Open("ReadWrite")
          $store.Add($cert)
          $store.Close()
          
          # Trouver signtool.exe
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          
          if ($signtool) {
            Write-Host "Signtool trouvé : $signtool"
            $exePath = "build\windows\x64\runner\Release\nova.exe"
            & $signtool sign /f $pfxPath /p "NovaGenix@2026!" /fd SHA256 /td SHA256 `
              /tr http://timestamp.digicert.com /v $exePath
            Write-Host "✅ Exécutable signé avec succès."
          } else {
            Write-Warning "⚠️ signtool.exe introuvable - signature ignorée."
          }
          
          # Sauvegarder le chemin PFX pour l'étape suivante
          echo "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer (.exe)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Sign installer executable
        shell: pwsh
        run: |
          $pfxPath = $env:PFX_PATH
          $installerPath = Get-ChildItem "Output\*.exe" | Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $installerPath) {
            Write-Error "❌ Aucun installateur trouvé dans Output\"
            exit 1
          }
          
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          
          if ($signtool -and (Test-Path $pfxPath)) {
            & $signtool sign /f $pfxPath /p "NovaGenix@2026!" /fd SHA256 /td SHA256 `
              /tr http://timestamp.digicert.com /v $installerPath
            Write-Host "✅ Installateur signé : $installerPath"
          } else {
            Write-Warning "⚠️ Signature de l'installateur ignorée (signtool ou certificat manquant)."
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: NovaGenix-Windows-Installer
          path: web/Output/*.exe
